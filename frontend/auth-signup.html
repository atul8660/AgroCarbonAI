<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up - AgroCarbonAI</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    .auth-container {
      display: flex;
      width: 100%;
      max-width: 1200px;
      gap: 30px;
      padding: 20px;
      align-items: center;
      justify-content: center;
    }

    .auth-card {
      background: white;
      border-radius: 20px;
      padding: 40px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      width: 100%;
      max-width: 480px;
      animation: slideIn 0.5s ease-out;
      max-height: 90vh;
      overflow-y: auto;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .auth-header {
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 30px;
      gap: 10px;
    }

    .auth-header .logo-icon {
      font-size: 2rem;
      background: linear-gradient(135deg, #667eea, #764ba2);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .auth-header h2 {
      color: #333;
      font-weight: 700;
      margin: 0;
      font-size: 1.5rem;
    }

    .form-group {
      margin-bottom: 18px;
    }

    .form-group label {
      font-weight: 600;
      color: #333;
      margin-bottom: 8px;
      display: block;
      font-size: 0.9rem;
    }

    .form-group input,
    .form-group select {
      width: 100%;
      padding: 12px 15px;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      font-size: 0.9rem;
      transition: all 0.3s ease;
      background: #f8f9fa;
      font-family: inherit;
    }

    .form-group input:focus,
    .form-group select:focus {
      outline: none;
      border-color: #667eea;
      background: white;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    .form-group input::placeholder {
      color: #999;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
    }

    .form-row .form-group {
      margin-bottom: 0;
    }

    .password-toggle {
      position: relative;
    }

    .password-toggle-icon {
      position: absolute;
      right: 15px;
      top: 40px;
      cursor: pointer;
      color: #667eea;
      transition: all 0.3s ease;
    }

    .password-toggle-icon:hover {
      transform: scale(1.1);
    }

    .form-check {
      margin-bottom: 20px;
    }

    .form-check input {
      width: auto;
      margin-right: 8px;
      cursor: pointer;
    }

    .form-check label {
      margin-bottom: 0;
      font-weight: 500;
      color: #555;
      cursor: pointer;
      font-size: 0.9rem;
    }

    .signup-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #52c41a, #73d13d);
      color: white;
      border: none;
      border-radius: 10px;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-bottom: 18px;
    }

    .signup-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(82, 196, 26, 0.4);
    }

    .signup-btn:active {
      transform: translateY(0);
    }

    .divider {
      display: flex;
      align-items: center;
      margin: 20px 0;
      color: #999;
      font-size: 0.85rem;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #e0e0e0;
    }

    .divider span {
      margin: 0 12px;
    }

    .social-login {
      display: flex;
      gap: 15px;
      margin-bottom: 18px;
    }

    .social-btn {
      flex: 1;
      padding: 12px;
      border: 2px solid #e0e0e0;
      background: white;
      border-radius: 10px;
      cursor: pointer;
      font-size: 1.2rem;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #333;
    }

    .social-btn:hover {
      border-color: #667eea;
      background: #f8f9ff;
      transform: translateY(-2px);
    }

    .login-link {
      text-align: center;
      color: #555;
      font-size: 0.9rem;
    }

    .login-link a {
      color: #667eea;
      text-decoration: none;
      font-weight: 700;
      transition: all 0.3s ease;
    }

    .login-link a:hover {
      color: #764ba2;
    }

    .password-strength {
      margin-top: 8px;
      height: 4px;
      background: #e0e0e0;
      border-radius: 2px;
      overflow: hidden;
    }

    .password-strength-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #ff4d4f, #faad14, #52c41a);
      transition: width 0.3s ease;
    }

    .password-strength-text {
      font-size: 0.75rem;
      color: #999;
      margin-top: 4px;
    }

    @media (max-width: 768px) {
      .auth-container {
        flex-direction: column;
      }

      .auth-card {
        max-width: 100%;
        padding: 30px 20px;
      }

      .form-row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <i class="fas fa-leaf auth-header .logo-icon"></i>
        <h2>Create an Account</h2>
      </div>

      <form id="signupForm">
        <div class="form-row">
          <div class="form-group">
            <label for="firstName">First Name</label>
            <input 
              type="text" 
              id="firstName" 
              placeholder="Enter your first name" 
              required
            >
          </div>
          <div class="form-group">
            <label for="lastName">Last Name</label>
            <input 
              type="text" 
              id="lastName" 
              placeholder="Enter your last name" 
              required
            >
          </div>
        </div>

        <div class="form-group">
          <label for="email">Email Address</label>
          <input 
            type="email" 
            id="email" 
            placeholder="Enter your email" 
            required
          >
        </div>

        <div class="form-group password-toggle">
          <label for="password">Password</label>
          <input 
            type="password" 
            id="password" 
            placeholder="Create a password" 
            required
          >
          <i class="fas fa-eye password-toggle-icon" id="passwordToggle"></i>
          <div class="password-strength">
            <div class="password-strength-bar" id="passwordStrength"></div>
          </div>
          <div class="password-strength-text" id="passwordText"></div>
        </div>

        <div class="form-group password-toggle">
          <label for="confirmPassword">Confirm Password</label>
          <input 
            type="password" 
            id="confirmPassword" 
            placeholder="Confirm your password" 
            required
          >
          <i class="fas fa-eye password-toggle-icon" id="confirmPasswordToggle"></i>
        </div>

        <div class="form-check">
          <input class="form-check-input" type="checkbox" id="agreeTerms" required>
          <label class="form-check-label" for="agreeTerms">
            I agree to the <a href="#terms" style="color: #667eea; text-decoration: none;">Terms of Service</a> and <a href="#privacy" style="color: #667eea; text-decoration: none;">Privacy Policy</a>
          </label>
        </div>

        <button type="submit" class="signup-btn">Sign Up</button>
      </form>

      <div class="divider">
        <span>Or sign up with</span>
      </div>

      <div class="social-login">
        <button type="button" class="social-btn" title="Sign up with Google">
          <i class="fab fa-google"></i>
        </button>
        <button type="button" class="social-btn" title="Sign up with Facebook">
          <i class="fab fa-facebook-f"></i>
        </button>
      </div>

      <div class="login-link">
        Already have an account? <a href="auth-login.html">Sign In</a>
      </div>
    </div>
  </div>

  <script>
    const passwordInput = document.getElementById('password');
    const confirmPasswordInput = document.getElementById('confirmPassword');
    const passwordToggle = document.getElementById('passwordToggle');
    const confirmPasswordToggle = document.getElementById('confirmPasswordToggle');
    const passwordStrength = document.getElementById('passwordStrength');
    const passwordText = document.getElementById('passwordText');

    // Password visibility toggle
    passwordToggle.addEventListener('click', () => {
      togglePasswordVisibility(passwordInput, passwordToggle);
    });

    confirmPasswordToggle.addEventListener('click', () => {
      togglePasswordVisibility(confirmPasswordInput, confirmPasswordToggle);
    });

    function togglePasswordVisibility(input, toggle) {
      if (input.type === 'password') {
        input.type = 'text';
        toggle.classList.remove('fa-eye');
        toggle.classList.add('fa-eye-slash');
      } else {
        input.type = 'password';
        toggle.classList.remove('fa-eye-slash');
        toggle.classList.add('fa-eye');
      }
    }

    // Password strength indicator
    passwordInput.addEventListener('input', () => {
      const password = passwordInput.value;
      let strength = 0;
      let strengthText = '';

      if (password.length >= 8) strength += 25;
      if (password.length >= 12) strength += 25;
      if (/[a-z]/.test(password) && /[A-Z]/.test(password)) strength += 25;
      if (/[0-9]/.test(password) && /[!@#$%^&*]/.test(password)) strength += 25;

      if (strength < 25) {
        strengthText = 'Weak';
      } else if (strength < 50) {
        strengthText = 'Fair';
      } else if (strength < 75) {
        strengthText = 'Good';
      } else {
        strengthText = 'Strong';
      }

      passwordStrength.style.width = strength + '%';
      passwordText.textContent = strength > 0 ? strengthText : '';
    });

    // Form submission
    document.getElementById('signupForm').addEventListener('submit', (e) => {
      e.preventDefault();

      const firstName = document.getElementById('firstName').value;
      const lastName = document.getElementById('lastName').value;
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      const agreeTerms = document.getElementById('agreeTerms').checked;

      if (password !== confirmPassword) {
        alert('Passwords do not match!');
        return;
      }

      if (!agreeTerms) {
        alert('You must agree to the Terms of Service and Privacy Policy');
        return;
      }

      console.log('Signup attempt:', { firstName, lastName, email, agreeTerms });
      alert(`Account created for ${firstName} ${lastName} (${email})`);
      // Here you would send data to your backend
    });
  </script>
</body>
</html>
